version: 2

project_name: fishnet

before:
  hooks:
    - go mod tidy

builds:
  - id: fishnet
    main: ./
    binary: fishnet
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
          - CXX=x86_64-linux-gnu-g++
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
          - CXX=o64-clang++
      - goos: darwin
        goarch: arm64
        env:
          - CC=oa64-clang
          - CXX=oa64-clang++
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: fishnet
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

brews:
  - name: fishnet
    repository:
      owner: kidneyweakx
      name: fishnet
      branch: main
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "brew: bump {{ .ProjectName }} to {{ .Tag }} [skip ci]"
    homepage: "https://github.com/kidneyweakx/fishnet"
    description: "Simulation and analysis toolkit with ONNX-powered NLP"
    license: "AGPL-3.0"
    dependencies:
      - name: onnxruntime
    test: |
      system "#{bin}/fishnet", "--help"
    install: |
      bin.install "fishnet"

release:
  github:
    owner: kidneyweakx
    name: fishnet
  draft: false
  prerelease: auto
